[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
# E/F — pyflakes+pycodestyle, I — isort, B — bugbear, UP — pyupgrade
select = ["E", "F", "I", "B", "UP"]
ignore = [
    "E501",  # длинные строки — не критично для читаемости комментариев
    "B008",  # FastAPI Depends() в дефолтах — это идиома фреймворка
]

[tool.ruff.lint.per-file-ignores]
"seed.py" = ["E402"]
# bot.py намеренно вызывает load_dotenv() до импортов aiogram (env нужен раньше)
"bot.py" = ["E402"]
