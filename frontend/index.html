<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Radi coffee</title>
  <!-- SDK Telegram отдаём со СВОЕГО домена (не с telegram.org) — иначе у юзеров с VPN,
       где telegram.org режется, скрипт не грузится и мини-апп не получает initData. -->
  <script src="/tg-sdk.js"></script>
  <!-- фолбэк: если своя копия почему-то не загрузилась — тянем с telegram.org -->
  <script>
    if (!window.Telegram || !window.Telegram.WebApp) {
      document.write('<script src="https:\/\/telegram.org\/js\/telegram-web-app.js"><\/script>');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
