# Radi Coffee — host nginx vhost для radicoffee.consoleai.ru
# Статика мини-аппа из /opt/radicoffee/frontend/dist, /api → backend :8014.
# SSL-блок добавляет certbot --nginx после выпуска сертификата.

server {
    listen 80;
    listen [::]:80;
    server_name radicoffee.consoleai.ru;

    # ACME-challenge для Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    root /opt/radicoffee/frontend/dist;
    index index.html;

    # API → backend (FastAPI на loopback)
    location /api/ {
        proxy_pass http://127.0.0.1:8014;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # статика с кэшем
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html НЕ кэшируем — иначе клиент тянет старый JS из кэша Telegram WebView
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # SPA fallback
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
        try_files $uri $uri/ /index.html;
    }

    # Telegram Mini App должен открываться в iframe Telegram — НЕ ставим X-Frame-Options DENY.
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/radicoffee.access.log;
    error_log  /var/log/nginx/radicoffee.error.log;
}
